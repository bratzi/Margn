name: cluster
# DEAKTIVIERT: Echo-Cluster-Feature auf Eis gelegt (DB-Speicher, zu früh).
# Wieder aktivieren: schedule-Block auskommentieren entfernen.
on:
  # schedule:
  #   - cron: "45 */6 * * *"
  workflow_dispatch:
jobs:
  cluster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
        working-directory: scraper
      - run: npm run cluster
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
