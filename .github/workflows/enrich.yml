name: enrich
on:
  # Kein automatisches Scheduling mehr – neue Artikel werden sofort im scrape-Job voll angereichert.
  # workflow_dispatch bleibt für einmalige Nacharbeit am Altbestand (titel/published_at = NULL).
  workflow_dispatch:
# Überlappende Läufe verhindern (vorige Läufe wurden teils abgebrochen)
concurrency:
  group: enrich
  cancel-in-progress: false
jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json
      - run: npm ci
        working-directory: scraper
      - name: Cache Playwright-Browser
        id: pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraper/package-lock.json') }}
      - run: npx playwright install chromium
        working-directory: scraper
        if: steps.pw.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium
        working-directory: scraper
      - run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_MODE: "enrich"
          CRAWL_MAX_PAGES: "2500"
          CRAWL_DELAY_MS: "60"
          CRAWL_CONCURRENCY: "10"
