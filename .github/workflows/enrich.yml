name: enrich
on:
  # BEWUSST NUR AUF ZURUF (kein schedule — Altbestand-Backfill, kein Dauerlauf).
  # Zwei Wege, einen Lauf zu starten:
  #   1) UI: Actions → enrich → „Run workflow".
  #   2) Commit: eine Änderung an .github/enrich.trigger anstoßen (Datum/Zeile bumpen).
  #      So lässt sich enrich auch rein per Push auslösen (z.B. mit read-only-Token).
  # Neue Artikel werden bereits im pipeline-Job inline voll angereichert; enrich ist
  # nur fürs gezielte Nach-Anreichern des Altbestands. KEINEN schedule-Block ergänzen.
  workflow_dispatch:
  push:
    paths:
      - ".github/enrich.trigger"
# Überlappende Läufe verhindern (vorige Läufe wurden teils abgebrochen)
concurrency:
  group: enrich
  cancel-in-progress: false
jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json
      - run: npm ci
        working-directory: scraper
      - name: Cache Playwright-Browser
        id: pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraper/package-lock.json') }}
      - run: npx playwright install chromium
        working-directory: scraper
        if: steps.pw.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium
        working-directory: scraper
      - run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_MODE: "enrich"
          CRAWL_MAX_PAGES: "2500"
          CRAWL_DELAY_MS: "60"
          CRAWL_CONCURRENCY: "10"
