name: enrich
on:
  schedule:
    - cron: "15 1 * * *"   # täglich 01:15 UTC – rendert Backlog-Artikel ohne Titel, trägt Metadaten nach
  workflow_dispatch:
jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
        working-directory: scraper
      - run: npx playwright install --with-deps chromium
        working-directory: scraper
      - run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_MODE: "enrich"
          CRAWL_MAX_PAGES: "1500"   # ~250/Quelle pro Tag, Metadaten + Themen + Autoren
          CRAWL_DELAY_MS: "80"
          CRAWL_CONCURRENCY: "6"
