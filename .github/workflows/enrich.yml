name: enrich
on:
  # BEWUSST NUR MANUELL. Kein schedule/workflow_run — enrich läuft NICHT im
  # Gesamtprozess. Neue Artikel werden bereits im scrape-/analyze-Job inline
  # voll angereichert. Enrich nur per Hand starten, wenn es ausdrücklich
  # gewünscht ist ODER ein neues Feature Daten braucht, die der Altbestand
  # noch nicht hat (gezieltes Nach-Enrichen). Hier KEINEN schedule-Block ergänzen.
  workflow_dispatch:
  push:
    branches: [main]   # TEMPORÄR: einmaliger Backfill-Trigger (published_at-Fix)
# Überlappende Läufe verhindern (vorige Läufe wurden teils abgebrochen)
concurrency:
  group: enrich
  cancel-in-progress: false
jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json
      - run: npm ci
        working-directory: scraper
      - name: Cache Playwright-Browser
        id: pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraper/package-lock.json') }}
      - run: npx playwright install chromium
        working-directory: scraper
        if: steps.pw.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium
        working-directory: scraper
      - run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_MODE: "enrich"
          CRAWL_MAX_PAGES: "2500"
          CRAWL_DELAY_MS: "60"
          CRAWL_CONCURRENCY: "10"
