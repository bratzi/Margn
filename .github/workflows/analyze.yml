name: analyze
on:
  schedule:
    - cron: "30 2 * * *"   # täglich 02:30 UTC – arbeitet den entdeckten Artikel-Backlog ab
  workflow_dispatch:
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
        working-directory: scraper
      - run: npx playwright install --with-deps chromium
        working-directory: scraper
      - run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # analyze-Modus: bereits entdeckte pages.kind='article' rendern+embedden (kein Crawl).
          CRAWL_MODE: "analyze"
          CRAWL_MAX_PAGES: "6000"  # analyze braucht kein Chromium mehr → Batch läuft in Sekunden
