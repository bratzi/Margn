name: analyze
on:
  # Eigener Cron, entkoppelt von scrape: scrape entdeckt (billig, alle 2 h),
  # analyze rendert (teuer, hier alle 4 h) — neueste Artikel zuerst + Re-Scans.
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:
concurrency:
  group: analyze
  cancel-in-progress: false
jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json
      - run: npm ci
        working-directory: scraper
      - name: Cache Playwright-Browser
        id: pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraper/package-lock.json') }}
      - run: npx playwright install chromium
        working-directory: scraper
        if: steps.pw.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium
        working-directory: scraper
      - run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_MODE: "analyze"
          CRAWL_MAX_PAGES: "1500"
          CRAWL_DELAY_MS: "60"
          CRAWL_CONCURRENCY: "10"
