name: pipeline
on:
  schedule:
    # Drei Slots pro Stunde auf unauffaelligen Minuten (weg vom ueberlasteten :00).
    # GitHubs Scheduler verwirft/verzoegert geplante Trigger -> mehrere Slots fangen
    # einen verworfenen ab. Das Gate (Job unten) sorgt dafuer, dass trotzdem nur EIN
    # echter Lauf pro Stunde passiert (Dedupe ueber articles.last_seen).
    - cron: "7 * * * *"
    - cron: "27 * * * *"
    - cron: "47 * * * *"
    # Woechentlicher Struktur-Lauf (Seitenbaum) - laeuft immer, am Gate vorbei.
    - cron: "23 5 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        default: pipeline
        options: [pipeline, structure]
  push:
    paths:
      - ".github/pipeline.trigger"
concurrency:
  group: pipeline
  cancel-in-progress: false
jobs:
  # Leichtgewichtiges Gate: entscheidet, ob die schwere Pipeline laeuft.
  # - Manuell / Push-Trigger / woechentlicher Struktur-Lauf: immer durchlassen.
  # - Stuendlicher Schedule: nur laufen, wenn der letzte Scan >= GATE_MINUTES her ist.
  #   articles.last_seen wird frueh im Lauf hochgezogen (Discovery upsertet sofort),
  #   misst also ~"Zeit seit letztem Lauf-Start". So fangen die 3 Slots GitHubs
  #   verworfene Trigger ab, ohne 3x/Stunde zu rennen.
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decide.outputs.run }}
    env:
      GATE_MINUTES: "45"
    steps:
      - id: decide
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          # Nicht-stuendliche Ausloeser immer durchlassen.
          if [ "$EVENT_NAME" != "schedule" ] || [ "$SCHEDULE" = "23 5 * * 0" ]; then
            echo "Trigger=$EVENT_NAME schedule='$SCHEDULE' -> laeuft (kein Gate)."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Stuendlicher Schedule: Frische des letzten Scans pruefen.
          last=$(curl -fsS \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/articles?select=last_seen&order=last_seen.desc.nullslast&limit=1" \
            | jq -r '.[0].last_seen // empty') || last=""
          if [ -z "$last" ]; then
            echo "Kein last_seen lesbar -> sicherheitshalber laufen."
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          age=$(( ( $(date -u +%s) - $(date -u -d "$last" +%s) ) / 60 ))
          echo "Letzter Scan vor ${age} min (last_seen=$last), Schwelle=${GATE_MINUTES} min."
          if [ "$age" -ge "$GATE_MINUTES" ]; then
            echo "-> Faellig, Pipeline laeuft."
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "-> Frisch genug, Lauf uebersprungen (Dedupe)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  pipeline:
    needs: gate
    if: ${{ needs.gate.outputs.run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json
      - run: npm ci
        working-directory: scraper
      - name: Cache Playwright-Browser
        id: pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraper/package-lock.json') }}
      - run: npx playwright install chromium
        working-directory: scraper
        if: steps.pw.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium
        working-directory: scraper

      - name: discover
        if: ${{ (github.event_name == 'schedule' && github.event.schedule != '23 5 * * 0') || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pipeline') }}
        run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_RENDER: "0"
          CRAWL_MAX_FETCHES: "150"
          CRAWL_MAX_SITEMAP_URLS: "1500"
          CRAWL_MAX_DEPTH: "2"
          CRAWL_DELAY_MS: "50"
          CRAWL_CONCURRENCY: "10"
          CRAWL_TIME_BUDGET_MS: "180000"

      - name: render
        if: ${{ (github.event_name == 'schedule' && github.event.schedule != '23 5 * * 0') || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pipeline') }}
        run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_MODE: "analyze"
          CRAWL_MAX_PAGES: "2500"
          CRAWL_RESCAN_SHARE: "0.6"
          RESCAN_DAYS: "3"
          CRAWL_DELAY_MS: "60"
          CRAWL_CONCURRENCY: "10"

      - name: structure
        if: ${{ (github.event_name == 'schedule' && github.event.schedule == '23 5 * * 0') || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'structure') }}
        run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_MODE: "structure"
          CRAWL_MAX_PAGES: "100"
          CRAWL_MAX_DEPTH: "3"
          CRAWL_DELAY_MS: "300"
