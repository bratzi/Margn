name: pipeline
on:
  schedule:
    - cron: "23 * * * *"
    - cron: "23 5 * * 0"
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        default: pipeline
        options: [pipeline, structure]
  push:
    paths:
      - ".github/pipeline.trigger"
concurrency:
  group: pipeline
  cancel-in-progress: false
jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json
      - run: npm ci
        working-directory: scraper
      - name: Cache Playwright-Browser
        id: pw
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('scraper/package-lock.json') }}
      - run: npx playwright install chromium
        working-directory: scraper
        if: steps.pw.outputs.cache-hit != 'true'
      - run: npx playwright install-deps chromium
        working-directory: scraper

      - name: discover
        if: ${{ github.event.schedule == '23 * * * *' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pipeline') }}
        run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_RENDER: "0"
          CRAWL_MAX_FETCHES: "150"
          CRAWL_MAX_SITEMAP_URLS: "1500"
          CRAWL_MAX_DEPTH: "2"
          CRAWL_DELAY_MS: "50"
          CRAWL_CONCURRENCY: "10"
          CRAWL_TIME_BUDGET_MS: "180000"

      - name: render
        if: ${{ github.event.schedule == '23 * * * *' || github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'pipeline') }}
        run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_MODE: "analyze"
          CRAWL_MAX_PAGES: "2500"
          CRAWL_RESCAN_SHARE: "0.6"
          RESCAN_DAYS: "3"
          CRAWL_DELAY_MS: "60"
          CRAWL_CONCURRENCY: "10"

      - name: structure
        if: ${{ github.event.schedule == '23 5 * * 0' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'structure') }}
        run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_MODE: "structure"
          CRAWL_MAX_PAGES: "100"
          CRAWL_MAX_DEPTH: "3"
          CRAWL_DELAY_MS: "300"
