name: scrape
on:
  schedule:
    - cron: "0 */3 * * *"  # alle 3 Stunden – kleiner Cap + viel Parallelität = schnell & oft, im 2000-Min-Budget
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
        working-directory: scraper
      - run: npx playwright install --with-deps chromium
        working-directory: scraper
      - run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CRAWL_MAX_PAGES: "25"     # kleiner Cap → schneller Lauf (~5 Min); re-scannt Front-Artikel oft (Edit-Erkennung)
          CRAWL_MAX_DEPTH: "2"
          CRAWL_DELAY_MS: "120"
          CRAWL_CONCURRENCY: "6"    # 6 parallele Tabs
