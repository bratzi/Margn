name: scrape
on:
  schedule:
    - cron: "17 */3 * * *"  # alle 3 Stunden (rekursiver Chromium-Crawl ist schwerer als RSS)
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm install
        working-directory: scraper
      - run: npx playwright install --with-deps chromium
        working-directory: scraper
      - run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CRAWL_MAX_PAGES: "60"   # Seiten/Quelle (CI-tauglich; lokal höher für Tief-Crawl)
          CRAWL_MAX_DEPTH: "2"
          CRAWL_DELAY_MS: "300"
