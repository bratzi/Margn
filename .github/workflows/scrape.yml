name: scrape
on:
  schedule:
    - cron: "0 */2 * * *"  # alle 2 Stunden — reine HTTP-Entdeckung (kein Browser → günstig)
  workflow_dispatch:
concurrency:
  group: scrape
  cancel-in-progress: false
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scraper/package-lock.json
      - run: npm ci
        working-directory: scraper
      # KEINE Playwright-Installation: Discovery läuft rein über HTTP
      # (Sitemaps/Feeds/HTML-Links). Das Rendern macht der analyze-Job.
      - run: npm run scrape
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CRAWL_RENDER: "0"            # Discovery-Only, kein Browser
          # Schlank: News-Sitemaps + Feeds tragen die Artikel-Entdeckung; nur
          # flacher HTML-Crawl (Startseite/Rubriken für Feed-Erkennung). Hält
          # den Lauf bei ~3 min → alle 2 h bezahlbar.
          CRAWL_MAX_FETCHES: "150"
          CRAWL_MAX_SITEMAP_URLS: "1500"
          CRAWL_MAX_DEPTH: "2"
          CRAWL_DELAY_MS: "50"
          CRAWL_CONCURRENCY: "10"
          CRAWL_TIME_BUDGET_MS: "180000"  # 3 min gesamt
